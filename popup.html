<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>The 60-Minute Rule</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- Header -->
  <div class="header">
    <span class="header-icon">⏱</span>
    <div>
      <div class="header-title">The 60-Minute Rule</div>
      <div class="header-sub">Competitive Programming Protocol</div>
    </div>
  </div>

  <!-- Big Timer -->
  <div class="timer-display" id="timerDisplay">00:00</div>

  <!-- Progress bar (0–60 min) -->
  <div class="bar-wrap"><div class="bar-fill" id="barFill"></div></div>

  <!-- Current Phase Card -->
  <div class="phase-card" id="phaseCard">
    <div class="phase-badge" id="phaseBadge">Phase 1</div>
    <div class="phase-name" id="phaseName">Reconnaissance</div>
    <div class="phase-range" id="phaseRange">0 – 5 min</div>
    <div class="phase-tip" id="phaseTip">
      Read the problem twice. Check constraints. Guess the intended time complexity. Do NOT touch the keyboard.
    </div>
  </div>

  <!-- All 6 Steps List -->
  <div class="steps-list" id="stepsList"></div>

  <!-- Alarm Overlay (shown for 10 sec on phase change) -->
  <div class="alarm-overlay" id="alarmOverlay">
    <div class="alarm-bell" id="alarmBell">🔔</div>
    <div class="alarm-phase" id="alarmPhase">Phase 2: Observation</div>
    <div class="alarm-tip" id="alarmTip">Pen & paper only.</div>
    <div class="alarm-countdown" id="alarmCountdown">10</div>
    <div class="alarm-label">seconds</div>
  </div>

  <!-- Solved Banner -->
  <div class="solved-banner hidden" id="solvedBanner">
    ✅ Solved in <strong id="solvedTime">--:--</strong> — Ready for a new problem?
  </div>

  <!-- Buttons -->
  <div class="controls">
    <button class="btn btn-start"  id="startBtn">▶ Start</button>
    <button class="btn btn-solved hidden" id="solvedBtn">✅ Solved!</button>
    <button class="btn btn-reset  hidden" id="resetBtn">↺ Reset</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
